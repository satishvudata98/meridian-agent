AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: AI Research Agent - Databases & Memory (RDS, Redis, S3)

Resources:
  # 1. S3 bucket for Raw Documents (Archiving HTML scrapes for observability)
  RawDocumentBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "meridian-agent-raw-docs-${AWS::AccountId}-${AWS::Region}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # 2. Redis Cache for Rate Limiting / Quota management
  AgentRateLimitCache:
    Type: AWS::ElastiCache::ServerlessCache
    Properties:
      Engine: redis
      ServerlessCacheName: ai-agent-rate-limit

  # 3. DB Subnet Group — tells RDS which private subnets it can run in
  # Imports from the NetworkStack which must be deployed first
  AgentDBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: "Private subnets for the AI Agent RDS database"
      SubnetIds:
        - !ImportValue AgentPrivateSubnet1Id
        - !ImportValue AgentPrivateSubnet2Id

  # 4. PostgreSQL Database for Semantic Memory storage (pgvector)
  # Placed in private subnets, protected by DatabaseSecurityGroup (port 5432 only from Lambda SG)
  # NOTE: If updating an existing RDS instance, delete it from the console first.
  #       AWS does not allow adding a DBSubnetGroupName to a live instance in-place.
  AgentMemoryDB:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot   # On stack delete, take a final snapshot to preserve data
    UpdateReplacePolicy: Snapshot
    Properties:
      DBInstanceIdentifier: agent-memory-db
      AllocatedStorage: 20
      DBInstanceClass: db.t3.micro
      Engine: postgres
      EngineVersion: '16.3'
      MasterUsername: agentadmin
      # Security best practice: pulling password from Parameter Store at deploy time
      MasterUserPassword: '{{resolve:ssm:/agent/db_password}}'
      PubliclyAccessible: false
      DBSubnetGroupName: !Ref AgentDBSubnetGroup
      VPCSecurityGroups:
        - !ImportValue AgentDatabaseSecurityGroupId

Outputs:
  RawDocumentBucketName:
    Value: !Ref RawDocumentBucket

  # Export the RDS endpoint so AgentStack can inject it into the Lambda env vars
  DBEndpointAddress:
    Value: !GetAtt AgentMemoryDB.Endpoint.Address
    Export:
      Name: AgentDBEndpointAddress

  DBName:
    Value: postgres
    Export:
      Name: AgentDBName
