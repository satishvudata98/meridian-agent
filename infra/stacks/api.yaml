AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: AI Research Agent - API Gateway

Resources:
  # The Websocket Shell
  WebSocketApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: AgentRunsWebSocket
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: "$request.body.action"

  # Production stage deployment for the Websocket
  WebSocketStage:
    Type: AWS::ApiGatewayV2::Stage
    DependsOn:
      - ConnectRoute
      - DisconnectRoute
      - DefaultRoute
    Properties:
      ApiId: !Ref WebSocketApi
      StageName: prod
      AutoDeploy: true

  # The actual Python Logic managing connections to the socket
  WebSocketManagerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../backend/
      Handler: lambdas.websocket.handler.lambda_handler
      Runtime: python3.12
      Timeout: 10
      MemorySize: 128
      Environment:
        Variables:
          CONNECTIONS_TABLE: "AgentConnections"
          RUN_ACCESS_SECRET: '{{resolve:ssm-secure:/agent/run_access_secret}}'
      Policies:
        - DynamoDBCrudPolicy:
            TableName: "AgentConnections"

  # API Gateway Integrations bridging the API Shell to the Lambda
  WebSocketIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WebSocketManagerFunction.Arn}/invocations"

  ConnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: "$connect"
      Target: !Join [ "/", [ "integrations", !Ref WebSocketIntegration ] ]

  DisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: "$disconnect"
      Target: !Join [ "/", [ "integrations", !Ref WebSocketIntegration ] ]

  DefaultRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: "$default"
      Target: !Join [ "/", [ "integrations", !Ref WebSocketIntegration ] ]

  # Allows the API Gateway to invoke the Lambda
  WebSocketInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref WebSocketManagerFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*"

Outputs:
  WebSocketApiUrl:
    Value: !Sub "wss://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
