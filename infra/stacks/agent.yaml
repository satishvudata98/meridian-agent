AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: AI Research Agent - Orchestrator and SQS

Resources:
  AgentRunDeadLetterQueue:
    Type: AWS::SQS::Queue

  AgentRunQueue:
    Type: AWS::SQS::Queue
    Properties:
      # Agents might run long, setting high visibility timeout (15 mins)
      VisibilityTimeout: 900 
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt AgentRunDeadLetterQueue.Arn
        maxReceiveCount: 3

  AgentOrchestratorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../backend/
      Handler: lambdas.orchestrator.handler.lambda_handler
      Runtime: python3.12
      Timeout: 900
      MemorySize: 256
      Environment:
        Variables:
          # Will pull from SSM or environment overrides automatically in AWS
          TAVILY_API_KEY: "{{resolve:ssm:TAVILY_API_KEY}}" 
          OPENAI_API_KEY: "{{resolve:ssm:OPENAI_API_KEY}}"
          LLM_PROVIDER: "openai"
      Policies:
        - AWSLambdaBasicExecutionRole
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: "*"
        - DynamoDBCrudPolicy:
            TableName: "ResearchDigests"
      Events:
        SQSQueueEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt AgentRunQueue.Arn
            BatchSize: 1

  AgentTriggerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../backend/
      Handler: lambdas.api.trigger.lambda_handler
      Runtime: python3.12
      Timeout: 30
      MemorySize: 128
      FunctionUrlConfig:
        AuthType: NONE
      Environment:
        Variables:
          QUEUE_URL: !Ref AgentRunQueue
      Policies:
        - AWSLambdaBasicExecutionRole
        - SQSSendMessagePolicy:
            QueueName: !GetAtt AgentRunQueue.QueueName

  GetDigestsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../backend/
      Handler: lambdas.api.get_digests.lambda_handler
      Runtime: python3.12
      Timeout: 15
      MemorySize: 128
      FunctionUrlConfig:
        AuthType: NONE
      Environment:
        Variables:
          DIGESTS_TABLE: "ResearchDigests"
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBReadPolicy:
            TableName: "ResearchDigests"

Outputs:
  AgentRunQueueUrl:
    Value: !Ref AgentRunQueue
  AgentTriggerUrl:
    Value: !GetAtt AgentTriggerFunctionUrl.FunctionUrl
  GetDigestsUrl:
    Value: !GetAtt GetDigestsFunctionUrl.FunctionUrl
