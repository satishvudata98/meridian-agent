AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: AI Research Agent - Orchestrator and SQS

Parameters:
  CognitoUserPoolId:
    Type: String
  CognitoUserPoolClientId:
    Type: String
  WebSocketApiUrl:
    Type: String
  TavilyApiKey:
    Type: String
    NoEcho: true
  OpenAiApiKey:
    Type: String
    NoEcho: true
  RunAccessSecret:
    Type: String
    NoEcho: true
  DatabasePassword:
    Type: String
    NoEcho: true

Resources:
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowHeaders:
          - Authorization
          - Content-Type
        AllowOrigins:
          - '*'
      Auth:
        DefaultAuthorizer: CognitoJwtAuthorizer
        Authorizers:
          CognitoJwtAuthorizer:
            IdentitySource: '$request.header.Authorization'
            JwtConfiguration:
              issuer: !Sub 'https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPoolId}'
              audience:
                - !Ref CognitoUserPoolClientId

  AgentRunDeadLetterQueue:
    Type: AWS::SQS::Queue

  AgentRunQueue:
    Type: AWS::SQS::Queue
    Properties:
      # Agents might run long, setting high visibility timeout (15 mins)
      VisibilityTimeout: 900 
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt AgentRunDeadLetterQueue.Arn
        maxReceiveCount: 3

  AgentOrchestratorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../backend/
      Handler: lambdas.orchestrator.handler.lambda_handler
      Runtime: python3.12
      Timeout: 900
      MemorySize: 256
      Environment:
        Variables:
          # Will pull from SSM or environment overrides automatically in AWS
          TAVILY_API_KEY: !Ref TavilyApiKey
          OPENAI_API_KEY: !Ref OpenAiApiKey
          RUN_ACCESS_SECRET: !Ref RunAccessSecret
          LLM_PROVIDER: "openai"
          WS_API_ENDPOINT: !Ref WebSocketApiUrl
          # Database connection — sourced from the MemoryStack output
          DB_HOST: !ImportValue AgentDBEndpointAddress
          DB_USER: agentadmin
          DB_PASSWORD: !Ref DatabasePassword
          DB_NAME: !ImportValue AgentDBName
          CODE_EXECUTOR_ARN: !GetAtt CodeExecutorFunction.Arn
          HITL_TABLE: AgentPausedState

      # Attach Lambda to private subnets so it can securely reach RDS and route internet traffic via NAT
      VpcConfig:
        SecurityGroupIds:
          - !ImportValue AgentLambdaSecurityGroupId
        SubnetIds:
          - !ImportValue AgentPrivateSubnet1Id
          - !ImportValue AgentPrivateSubnet2Id
      Policies:
        - AWSLambdaBasicExecutionRole
        - AWSLambdaVPCAccessExecutionRole  # Required to create/delete VPC network interfaces (ENIs)
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: "*"
        - Statement:
            - Effect: Allow
              Action:
                - execute-api:ManageConnections
              Resource: "arn:aws:execute-api:*:*:*/*"
        - DynamoDBCrudPolicy:
            TableName: "ResearchDigests"
        - DynamoDBCrudPolicy:
            TableName: "AgentPausedState"
        - DynamoDBReadPolicy:
            TableName: "AgentConnections"
        - Statement:
            - Effect: Allow
              Action:
                - lambda:InvokeFunction
              Resource: !GetAtt CodeExecutorFunction.Arn

      Events:
        SQSQueueEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt AgentRunQueue.Arn
            BatchSize: 1

  AgentTriggerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../backend/
      Handler: lambdas.api.trigger.lambda_handler
      Runtime: python3.12
      Timeout: 30
      MemorySize: 128
      FunctionUrlConfig:
        AuthType: NONE
      Environment:
        Variables:
          QUEUE_URL: !Ref AgentRunQueue
          RUNS_TABLE: AgentRuns
          RUN_ACCESS_SECRET: !Ref RunAccessSecret
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBCrudPolicy:
            TableName: AgentRuns
        - SQSSendMessagePolicy:
            QueueName: !GetAtt AgentRunQueue.QueueName
      Events:
        AuthenticatedRunCreate:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /runs
            Method: POST

  RunStreamTicketFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../backend/
      Handler: lambdas.api.stream_ticket.lambda_handler
      Runtime: python3.12
      Timeout: 15
      MemorySize: 128
      Environment:
        Variables:
          RUNS_TABLE: AgentRuns
          RUN_ACCESS_SECRET: !Ref RunAccessSecret
          STREAM_TICKET_TTL_SECONDS: '900'
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBReadPolicy:
            TableName: AgentRuns
      Events:
        AuthenticatedStreamTicket:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /runs/{run_id}/stream-ticket
            Method: POST

  GetDigestsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../backend/
      Handler: lambdas.api.get_digests.lambda_handler
      Runtime: python3.12
      Timeout: 15
      MemorySize: 128
      FunctionUrlConfig:
        AuthType: NONE
      Environment:
        Variables:
          DIGESTS_TABLE: "ResearchDigests"
          HITL_TABLE: "AgentPausedState"

      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBReadPolicy:
            TableName: "ResearchDigests"
        - DynamoDBReadPolicy:
            TableName: "AgentPausedState"
      Events:
        AuthenticatedDigestList:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /digests
            Method: GET


  CodeExecutorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../backend/
      Handler: lambdas.code_executor.handler.lambda_handler
      Runtime: python3.12
      Timeout: 30
      MemorySize: 256
      # No VPC, No Env Vars, No IAM access beyond logging - Maximum Isolation
      Policies:
        - AWSLambdaBasicExecutionRole

  # HITL: HTTP endpoint the UI calls when user submits an answer
  HITLResumeFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../backend/
      Handler: lambdas.hitl.resume.lambda_handler
      Runtime: python3.12
      Timeout: 15
      MemorySize: 128
      FunctionUrlConfig:
        AuthType: NONE
      Environment:
        Variables:
          HITL_TABLE: AgentPausedState
          QUEUE_URL: !Ref AgentRunQueue
          RUN_ACCESS_SECRET: !Ref RunAccessSecret
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBCrudPolicy:
            TableName: AgentPausedState
        - SQSSendMessagePolicy:
            QueueName: !GetAtt AgentRunQueue.QueueName
      Events:
        AuthenticatedHitlResume:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /runs/{run_id}/resume
            Method: POST

  # HITL: EventBridge-triggered function to auto-resume stale paused runs after 2 hours
  HITLTimeoutFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../backend/
      Handler: lambdas.hitl.timeout.lambda_handler
      Runtime: python3.12
      Timeout: 60
      MemorySize: 128
      Environment:
        Variables:
          HITL_TABLE: AgentPausedState
          QUEUE_URL: !Ref AgentRunQueue
      Events:
        # Runs every 30 minutes to catch expired HITL pauses
        HITLTimeoutSchedule:
          Type: Schedule
          Properties:
            Schedule: rate(30 minutes)
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBCrudPolicy:
            TableName: AgentPausedState
        - SQSSendMessagePolicy:
            QueueName: !GetAtt AgentRunQueue.QueueName

Outputs:
  HttpApiUrl:
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/"
  HttpApiId:
    Value: !Ref HttpApi
  AgentRunQueueUrl:
    Value: !Ref AgentRunQueue
  AgentTriggerUrl:
    Value: !GetAtt AgentTriggerFunctionUrl.FunctionUrl
  GetDigestsUrl:
    Value: !GetAtt GetDigestsFunctionUrl.FunctionUrl
  HITLResumeUrl:
    Value: !GetAtt HITLResumeFunctionUrl.FunctionUrl
