AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: AI Research Agent - Orchestrator and SQS

Resources:
  AgentRunDeadLetterQueue:
    Type: AWS::SQS::Queue

  AgentRunQueue:
    Type: AWS::SQS::Queue
    Properties:
      # Agents might run long, setting high visibility timeout (15 mins)
      VisibilityTimeout: 900 
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt AgentRunDeadLetterQueue.Arn
        maxReceiveCount: 3

  AgentOrchestratorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../backend/
      Handler: lambdas.orchestrator.handler.lambda_handler
      Runtime: python3.12
      Timeout: 900
      MemorySize: 256
      Environment:
        Variables:
          # Will pull from SSM or environment overrides automatically in AWS
          TAVILY_API_KEY: "{{resolve:ssm:TAVILY_API_KEY}}"
          OPENAI_API_KEY: "{{resolve:ssm:OPENAI_API_KEY}}"
          LLM_PROVIDER: "openai"
          WS_API_ENDPOINT: "{{resolve:ssm:WS_API_ENDPOINT}}"
          # Database connection — sourced from the MemoryStack output
          DB_HOST: !ImportValue AgentDBEndpointAddress
          DB_USER: agentadmin
          DB_PASSWORD: '{{resolve:ssm:/agent/db_password}}'
          DB_NAME: !ImportValue AgentDBName
          CODE_EXECUTOR_ARN: !GetAtt CodeExecutorFunction.Arn

      # Attach Lambda to private subnets so it can securely reach RDS and route internet traffic via NAT
      VpcConfig:
        SecurityGroupIds:
          - !ImportValue AgentLambdaSecurityGroupId
        SubnetIds:
          - !ImportValue AgentPrivateSubnet1Id
          - !ImportValue AgentPrivateSubnet2Id
      Policies:
        - AWSLambdaBasicExecutionRole
        - AWSLambdaVPCAccessExecutionRole  # Required to create/delete VPC network interfaces (ENIs)
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: "*"
        - Statement:
            - Effect: Allow
              Action:
                - execute-api:ManageConnections
              Resource: "arn:aws:execute-api:*:*:*/*"
        - DynamoDBCrudPolicy:
            TableName: "ResearchDigests"
        - DynamoDBReadPolicy:
            TableName: "AgentConnections"
        - Statement:
            - Effect: Allow
              Action:
                - lambda:InvokeFunction
              Resource: !GetAtt CodeExecutorFunction.Arn

      Events:
        SQSQueueEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt AgentRunQueue.Arn
            BatchSize: 1

  AgentTriggerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../backend/
      Handler: lambdas.api.trigger.lambda_handler
      Runtime: python3.12
      Timeout: 30
      MemorySize: 128
      FunctionUrlConfig:
        AuthType: NONE
      Environment:
        Variables:
          QUEUE_URL: !Ref AgentRunQueue
      Policies:
        - AWSLambdaBasicExecutionRole
        - SQSSendMessagePolicy:
            QueueName: !GetAtt AgentRunQueue.QueueName

  GetDigestsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../backend/
      Handler: lambdas.api.get_digests.lambda_handler
      Runtime: python3.12
      Timeout: 15
      MemorySize: 128
      FunctionUrlConfig:
        AuthType: NONE
      Environment:
        Variables:
          DIGESTS_TABLE: "ResearchDigests"
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBReadPolicy:
            TableName: "ResearchDigests"

  CodeExecutorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../backend/
      Handler: lambdas.code_executor.handler.lambda_handler
      Runtime: python3.12
      Timeout: 30
      MemorySize: 256
      # No VPC, No Env Vars, No IAM access beyond logging - Maximum Isolation
      Policies:
        - AWSLambdaBasicExecutionRole


Outputs:
  AgentRunQueueUrl:
    Value: !Ref AgentRunQueue
  AgentTriggerUrl:
    Value: !GetAtt AgentTriggerFunctionUrl.FunctionUrl
  GetDigestsUrl:
    Value: !GetAtt GetDigestsFunctionUrl.FunctionUrl
